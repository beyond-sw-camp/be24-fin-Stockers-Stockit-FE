apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stockit-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.stockit.kro.kr
      secretName: stockit-tls
  rules:
    - host: www.stockit.kro.kr
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: stockit-be
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: front-service
                port:
                  number: 80