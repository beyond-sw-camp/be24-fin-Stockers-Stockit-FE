apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend-container
          image: saralove20/stockit-front:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80

          # 1. ConfigMap 마운트 (Nginx 설정 주입)
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

          # 2. 프로브 설정
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: nginx-config
          configMap:
            name: front-config
            items:
              - key: default.conf
                path: default.conf
